events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
    client_max_body_size 50M;

    upstream frontend { server web-frontend:3000; }
    upstream backend  { server web-backend:8000;  }

    # ============== HTTP (порт 80) — редирект на HTTPS ==============
    server {
        listen 80;
        server_name mk.da-net.net _;

        # Letsencrypt ACME challenge — должен оставаться на HTTP для renew
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное — редиректим на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============== HTTPS (порт 443) ==============
    server {
        listen 443 ssl;
        http2  on;
        server_name mk.da-net.net;

        ssl_certificate     /etc/letsencrypt/live/mk.da-net.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mk.da-net.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location /api/ {
            proxy_pass         http://backend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /stickers/ {
            proxy_pass         http://backend/stickers/;
            proxy_set_header   Host $host;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
