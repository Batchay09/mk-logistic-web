events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
    client_max_body_size 50M;

    upstream frontend {
        server web-frontend:3000;
    }

    upstream backend {
        server web-backend:8000;
    }

    # HTTP → redirect to HTTPS (or serve directly if no SSL)
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Uncomment when SSL is ready, comment the proxy_pass block below
        # return 301 https://$host$request_uri;

        # Direct HTTP (development / before SSL setup)
        location /api/ {
            proxy_pass         http://backend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /stickers/ {
            proxy_pass         http://backend/stickers/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS (uncomment after certbot setup)
    # server {
    #     listen 443 ssl;
    #     server_name mk-logistic.ru;
    #
    #     ssl_certificate     /etc/letsencrypt/live/mk-logistic.ru/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/mk-logistic.ru/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /api/ { proxy_pass http://backend/; ... }
    #     location /stickers/ { proxy_pass http://backend/stickers/; }
    #     location / { proxy_pass http://frontend; ... }
    # }
}
