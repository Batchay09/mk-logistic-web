# Staging стенд для mk.da-net.net
# - Изолированный Postgres (не трогает БД бота)
# - nginx на 80 (HTTP, без SSL пока)
# - Внутренняя сеть mk-stage, никаких external networks

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mk_user
      POSTGRES_PASSWORD: mk_pass
      POSTGRES_DB: mk_logistic
    volumes:
      - pg_data_stage:/var/lib/postgresql/data
    networks:
      - mk-stage

  web-backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "alembic upgrade head && python -m app.db.seeds && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    depends_on:
      - db
    networks:
      - mk-stage

  web-frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://mk.da-net.net/api
    restart: unless-stopped
    env_file: .env
    environment:
      - API_URL=http://web-backend:8000
    depends_on:
      - web-backend
    networks:
      - mk-stage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - web-frontend
      - web-backend
    networks:
      - mk-stage

volumes:
  pg_data_stage:

networks:
  mk-stage:
    driver: bridge
